services:
  docker:
    image: docker:dind
    container_name: jenkins-docker
    privileged: true
    restart: unless-stopped
    command:
      - --insecure-registry=nexus:8083
    environment:
      DOCKER_TLS_CERTDIR: /certs
    volumes:
      - jenkins_docker_certs:/certs/client
      - jenkins_home:/var/jenkins_home
      - docker_data:/var/lib/docker
    networks:
      cicd:
        aliases:
          - docker

  jenkins:
    build:
      context: .
      dockerfile: jenkins/Dockerfile
    image: local/jenkins-with-docker-python:lts
    container_name: jenkins
    restart: unless-stopped
    environment:
      DOCKER_HOST: tcp://docker:2376
      DOCKER_CERT_PATH: /certs/client
      DOCKER_TLS_VERIFY: "1"
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - jenkins_docker_certs:/certs/client:ro
    networks:
      - cicd

  nexus:
    image: sonatype/nexus3:3.90.2-ubi
    container_name: nexus
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "8083:8083"
    volumes:
      - nexus_data:/nexus-data
    networks:
      - cicd

volumes:
  jenkins_home:
  jenkins_docker_certs:
  docker_data:
  nexus_data:

networks:
  cicd:
    driver: bridge